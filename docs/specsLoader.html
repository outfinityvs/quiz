<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specification Matrix - Skill Repository Documentation</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
  </script>
</head>
<body>
  <div data-include="partials/header.html"></div>
  <main class="page">
    <div class="page__panel loader-frame">
      <div class="loader-heading">
        <div>
          <p class="kicker">Specification Viewer</p>
          <h1 id="spec-title">Specification Matrix</h1>
        </div>
        <small>
          <a href="index.html">Home</a> |
          <a href="specsLoader.html?spec=matrix.md">Specs</a> |
          <span id="current-spec">Loading...</span>
        </small>
      </div>

      <div id="spec-meta"></div>
      <div id="content" class="content">
        <div class="loading">Loading specification...</div>
      </div>
    </div>
  </main>
  <div data-include="partials/footer.html"></div>

  <script>
    class SpecsLoader {
      constructor() {
        this.content = document.getElementById('content');
        this.currentSpecSpan = document.getElementById('current-spec');
        this.specTitle = document.getElementById('spec-title');
        this.specMeta = document.getElementById('spec-meta');
        this.specPath = this.getSpecPath();
        this.load();
      }

      getSpecPath() {
        const params = new URLSearchParams(window.location.search);
        return params.get('spec');
      }

      parseFrontmatter(markdown) {
        if (!markdown.startsWith('---\n')) {
          return { metadata: {}, body: markdown };
        }

        const endIndex = markdown.indexOf('\n---\n', 4);
        if (endIndex === -1) {
          return { metadata: {}, body: markdown };
        }

        const metadata = {};
        for (const line of markdown.slice(4, endIndex).trim().split('\n')) {
          const match = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
          if (match) {
            metadata[match[1]] = match[2];
          }
        }

        return {
          metadata,
          body: markdown.slice(endIndex + 5)
        };
      }

      async load() {
        if (!this.specPath) {
          window.location.href = 'specsLoader.html?spec=matrix.md';
          return;
        }

        try {
          this.currentSpecSpan.textContent = `Loading: ${this.specPath}`;
          const response = await fetch(`specs/${this.specPath}`);
          if (!response.ok) {
            throw new Error(`Specification not found: ${this.specPath}`);
          }

          const markdown = await response.text();
          const { metadata, body } = this.parseFrontmatter(markdown);
          const html = this.markdownToHtml(body);

          this.content.innerHTML = html;
          this.renderMetadata(metadata);
          this.currentSpecSpan.textContent = this.specPath;
          this.scrollToHash();

          const title = metadata.title || body.match(/^#\s+(.+)$/m)?.[1] || this.specPath;
          this.specTitle.textContent = title;
          document.title = `${title} - Skill Repository Documentation`;
        } catch (error) {
          this.showError(error.message);
        }
      }

      renderMetadata(metadata) {
        if (!metadata || Object.keys(metadata).length === 0) {
          this.specMeta.innerHTML = '';
          return;
        }

        const items = [];
        if (metadata.id) {
          items.push(this.renderMetaItem('Identifier', `<code>${this.escapeHtml(metadata.id)}</code>`));
        }
        if (metadata.status) {
          items.push(
            this.renderMetaItem(
              'Status',
              `<span class="spec-status spec-status--${this.normalizeStatus(metadata.status)}">${this.escapeHtml(metadata.status)}</span>`
            )
          );
        }
        if (metadata.owner) {
          items.push(this.renderMetaItem('Owner', this.escapeHtml(metadata.owner)));
        }
        if (metadata.summary) {
          items.push(this.renderMetaItem('Summary', this.escapeHtml(metadata.summary)));
        }

        this.specMeta.innerHTML = items.length
          ? `<section class="spec-meta"><div class="spec-meta__grid">${items.join('')}</div></section>`
          : '';
      }

      renderMetaItem(label, value) {
        return `<dl class="spec-meta__item"><dt>${label}</dt><dd>${value}</dd></dl>`;
      }

      normalizeStatus(status) {
        return String(status).trim().toLowerCase().replace(/\s+/g, '-');
      }

      scrollToHash() {
        const hash = decodeURIComponent(window.location.hash.slice(1));
        if (!hash) return;
        const target = document.getElementById(hash);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      showError(message) {
        this.specMeta.innerHTML = '';
        this.content.innerHTML = `
          <div class="error-panel">
            <h3>Error Loading Specification</h3>
            <p>${this.escapeHtml(message)}</p>
            <p><a href="specsLoader.html?spec=matrix.md">Return to Specification Matrix</a></p>
          </div>
        `;
        this.currentSpecSpan.textContent = 'Error';
      }

      escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      renderStatus(status) {
        const normalized = this.normalizeStatus(status);
        const labels = {
          implemented: 'Implemented',
          'in-progress': 'In progress',
          planned: 'Planned',
          draft: 'Draft',
          'review-needed': 'Review needed',
          deprecated: 'Deprecated',
          unknown: 'Unknown'
        };
        const label = labels[normalized] || status;
        return `<span class="spec-status spec-status--${normalized}">${this.escapeHtml(label)}</span>`;
      }

      applyInline(text) {
        const codeStore = [];
        const withPlaceholders = text.replace(/`([^`]+)`/g, (_, code) => {
          codeStore.push(code);
          return `@@CODE_PLACEHOLDER_${codeStore.length - 1}@@`;
        });

        let escaped = this.escapeHtml(withPlaceholders)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/(^|[\s(])_(.+?)_(?=[\s).]|$)/g, '$1<em>$2</em>')
          .replace(/\[\[(status):([a-z-]+)\]\]/gi, (_, __, value) => this.renderStatus(value))
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

        escaped = escaped.replace(/@@CODE_PLACEHOLDER_(\d+)@@/g, (_, idx) =>
          `<code>${this.escapeHtml(codeStore[idx])}</code>`
        );

        return escaped;
      }

      parseTable(startIndex, lines) {
        const headerLine = lines[startIndex];
        const dividerLine = lines[startIndex + 1];
        const rowPattern = /^\s*\|(.+)\|\s*$/;
        const dividerPattern = /^\s*\|?[\s:|\-]+\|?\s*$/;

        if (!rowPattern.test(headerLine) || !dividerLine || !dividerPattern.test(dividerLine)) {
          return null;
        }

        const headers = headerLine.trim().slice(1, -1).split('|').map((cell) => this.applyInline(cell.trim()));
        const rows = [];
        let cursor = startIndex + 2;

        while (cursor < lines.length && rowPattern.test(lines[cursor])) {
          rows.push(lines[cursor].trim().slice(1, -1).split('|').map((cell) => this.applyInline(cell.trim())));
          cursor += 1;
        }

        const thead = `<thead><tr>${headers.map((cell) => `<th>${cell}</th>`).join('')}</tr></thead>`;
        const tbody = rows
          .map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`)
          .join('');

        return {
          html: `<div class="table-wrap"><table class="spec-table">${thead}<tbody>${tbody}</tbody></table></div>`,
          nextIndex: cursor - 1
        };
      }

      markdownToHtml(markdown) {
        const lines = markdown.split('\n');
        const htmlParts = [];
        let paragraph = [];
        let listItems = [];
        let inCode = false;
        let codeBuffer = [];

        const flushParagraph = () => {
          if (!paragraph.length) return;
          htmlParts.push(`<p>${paragraph.map((line) => this.applyInline(line)).join('<br>')}</p>`);
          paragraph = [];
        };

        const flushList = () => {
          if (!listItems.length) return;
          htmlParts.push(`<ul>${listItems.map((item) => `<li>${item}</li>`).join('')}</ul>`);
          listItems = [];
        };

        const flushCode = () => {
          if (!codeBuffer.length) return;
          htmlParts.push(`<pre><code>${this.escapeHtml(codeBuffer.join('\n'))}</code></pre>`);
          codeBuffer = [];
        };

        for (let index = 0; index < lines.length; index += 1) {
          const rawLine = lines[index];
          const line = rawLine.trimEnd();
          const trimmed = line.trim();

          if (trimmed.startsWith('```')) {
            if (inCode) {
              flushCode();
              inCode = false;
            } else {
              flushParagraph();
              flushList();
              inCode = true;
            }
            continue;
          }

          if (inCode) {
            codeBuffer.push(rawLine);
            continue;
          }

          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }

          if (trimmed.startsWith('|') && trimmed.endsWith('|') && index + 1 < lines.length) {
            const table = this.parseTable(index, lines);
            if (table) {
              flushParagraph();
              flushList();
              htmlParts.push(table.html);
              index = table.nextIndex;
              continue;
            }
          }

          const headingMatch = trimmed.match(/^(#{1,4})\s+(.+)$/);
          if (headingMatch) {
            flushParagraph();
            flushList();
            const level = headingMatch[1].length;
            const text = this.applyInline(headingMatch[2]);
            htmlParts.push(`<h${level}>${text}</h${level}>`);
            continue;
          }

          const numberedMatch = trimmed.match(/^\d+\.\s+(.+)/);
          if (numberedMatch) {
            flushParagraph();
            listItems.push(this.applyInline(numberedMatch[1]));
            continue;
          }

          const bulletMatch = trimmed.match(/^-\s+(.+)/);
          if (bulletMatch) {
            flushParagraph();
            listItems.push(this.applyInline(bulletMatch[1]));
            continue;
          }

          flushList();
          paragraph.push(line);
        }

        flushCode();
        flushList();
        flushParagraph();
        return htmlParts.join('\n');
      }
    }

    document.addEventListener('DOMContentLoaded', () => new SpecsLoader());
  </script>
  <script src="partials-loader.js"></script>
</body>
</html>
